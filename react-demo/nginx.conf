server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fallback ke index.html agar route React (mis. /materi, /tentang)
    # tetap bekerja saat halaman di-refresh atau dibuka langsung
    location / {
        try_files $uri $uri/ /index.html;
    }
}
