<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Demo — Distritek DevOps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 3rem;
      max-width: 560px;
      width: 100%;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #ffffff; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    ul { list-style: none; }
    li {
      padding: 0.75rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }
    li span:first-child { color: #94a3b8; }
    code {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    footer { margin-top: 2rem; font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐳</div>
    <h1>Halo dari dalam Container!</h1>
    <p class="subtitle">Halaman ini di-serve oleh Nginx yang berjalan di dalam container.</p>

    <div class="status"><span class="dot"></span> Container berjalan</div>

    <ul>
      <li><span>Web server</span> <span>Nginx (alpine)</span></li>
      <li><span>Port container</span> <code>80</code></li>
      <li><span>Port host</span> <code>8080</code></li>
      <li><span>Build dari</span> <code>Dockerfile</code></li>
    </ul>

    <footer>Materi Dasar Docker — Distritek DevOps</footer>
  </div>
</body>
</html>
